<body class="text-on-background min-h-screen pb-32">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-40 bg-gradient-to-br from-orange-600 via-orange-400 to-secondary-container p-6 pb-14 rounded-none shadow-none">

</div>
</div>

<div class="grid grid-cols-2 gap-4 text-sm">

</div>

</div>
</div>
</div>

<div class="p-5">
<div class="flex justify-between items-center mb-4">
<span class="font-headline font-extrabold text-lg text-on-surface">みずき</span>

</div>

</div>
</div>
</div>
</div>

<div class="bg-surface-container-lowest rounded-lg p-4 flex items-center justify-between shadow-sm">

</div>
