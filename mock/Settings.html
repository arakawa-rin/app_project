<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#0d0e0e",
              "on-primary-container": "#451b00",
              "surface-container-high": "#e2e2e1",
              "surface-bright": "#f7f6f5",
              "on-tertiary-fixed": "#2a3757",
              "background": "#f7f6f5",
              "on-error": "#ffefec",
              "tertiary-dim": "#424f70",
              "surface-container": "#e8e8e7",
              "on-secondary-container": "#145a5f",
              "on-tertiary": "#f0f2ff",
              "tertiary-container": "#c9d6fe",
              "on-primary-fixed-variant": "#542200",
              "tertiary-fixed-dim": "#bbc9f0",
              "primary-container": "#f9873e",
              "on-secondary-fixed": "#00474b",
              "error-dim": "#b92902",
              "on-secondary-fixed-variant": "#226469",
              "on-secondary": "#cdfbff",
              "tertiary": "#4e5b7d",
              "outline-variant": "#adadac",
              "error": "#b02500",
              "secondary-container": "#afedf3",
              "surface-container-highest": "#dcdddc",
              "primary-dim": "#843a00",
              "surface-container-low": "#f1f1f0",
              "inverse-primary": "#f9873e",
              "on-background": "#2e2f2f",
              "primary-fixed-dim": "#e97b32",
              "error-container": "#f95630",
              "primary": "#964300",
              "surface": "#f7f6f5",
              "secondary-dim": "#11585d",
              "secondary": "#226469",
              "tertiary-fixed": "#c9d6fe",
              "surface-dim": "#d4d4d4",
              "surface-tint": "#964300",
              "on-primary-fixed": "#100300",
              "secondary-fixed": "#afedf3",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#9d9d9c",
              "on-surface-variant": "#5b5c5b",
              "primary-fixed": "#f9873e",
              "on-tertiary-container": "#3d4a6b",
              "surface-variant": "#dcdddc",
              "secondary-fixed-dim": "#a1dfe5",
              "on-tertiary-fixed-variant": "#475475",
              "on-surface": "#2e2f2f",
              "outline": "#767776",
              "on-primary": "#fff0e9",
              "on-error-container": "#520c00"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-gradient-to-br from-orange-600 via-orange-400 to-secondary-container rounded-b-[3rem] shadow-xl shadow-orange-500/10 pb-8">
<div class="flex items-center justify-between px-7 pt-12 w-full max-w-none">
<h1 class="font-headline font-bold text-4xl text-white tracking-tight">設定</h1>
<div class="flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md px-4 py-1">
<h1 class="text-white font-extrabold italic tracking-tighter text-2xl font-headline">TripSplit</h1>
</div>
</div>
</header>
<main class="px-6 space-y-6 mt-8">
<!-- Account Section -->
<!-- Bento Layout for App Info & Other -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- About App Section -->
<section class="space-y-3">
<h2 class="px-2 font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">アプリについて</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.04)]">
<div class="flex items-center justify-between p-5 border-b border-surface-container/30 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<span class="font-medium">バージョン 1.0.0</span>
</div>
</div>
<div class="flex items-center justify-between p-5 border-b border-surface-container/30 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="gavel">gavel</span>
<span class="font-medium">利用規約</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="open_in_new">open_in_new</span>
</div>
<div class="flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="verified_user">verified_user</span>
<span class="font-medium">プライバシーポリシー</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="open_in_new">open_in_new</span>
</div>
</div>
</section>
<!-- Other Section -->
<section class="space-y-3">
<h2 class="px-2 font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">その他</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.04)]">
<div class="flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center">
<span class="material-symbols-outlined text-orange-600" data-icon="rate_review">rate_review</span>
</div>
<span class="font-medium">フィードバックを送信</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Decoration / Editorial Touch -->
</section>
</div>
<!-- Logout Button -->
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white border-t border-gray-100 px-10 pb-4 pt-2 flex justify-between items-center h-20 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
<!-- Left Tab: Inactive -->
<a class="flex flex-col items-center justify-center text-gray-400 gap-1 w-20" href="#">
<span class="material-symbols-outlined text-[26px]">home</span>
<span class="text-[10px] font-bold">イベント一覧</span>
</a>
<!-- Center Floating Button (Integrated into row) -->
<div class="flex items-center justify-center">
<button class="w-14 h-14 bg-gradient-to-br from-[#00bcd4] to-[#2196f3] rounded-full flex items-center justify-center text-white shadow-lg shadow-cyan-500/30 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
</div>
<!-- Right Tab: Active for Settings screen -->
<a class="flex flex-col items-center justify-center text-[#964300] gap-1 w-20" href="#">
<span class="material-symbols-outlined text-[26px]">settings</span>
<span class="text-[10px] font-bold">設定</span>
</a>
</nav>
</body></html>
