<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参加者を選択 - TripSplit</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 440px;
            width: 100%;
        }
        .back-link {
            display: inline-block;
            color: #4dd0e1;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #4dd0e1;
            border-radius: 20px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .back-link:hover {
            background: #4dd0e1;
            color: #0f2027;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .event-badge {
            display: inline-block;
            background: rgba(77, 208, 225, 0.15);
            color: #4dd0e1;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 14px;
        }
        .error-msg {
            background: rgba(244, 67, 54, 0.15);
            border-left: 4px solid #f44336;
            color: #ff8a80;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 500;
            color: #4dd0e1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .radio-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .radio-item:hover {
            border-color: #4dd0e1;
            background: rgba(77, 208, 225, 0.08);
        }
        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #4dd0e1;
        }
        .radio-item span {
            font-size: 15px;
            color: #e0e0e0;
        }
        .radio-item-new {
            border-style: dashed;
        }
        .radio-item-new span {
            color: #4dd0e1;
        }
        #new_name_section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #new_name_section label {
            display: block;
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 6px;
            font-weight: 500;
        }
        #new_name_section input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: 'Noto Sans JP', sans-serif;
            transition: border-color 0.2s;
        }
        #new_name_section input:focus {
            outline: none;
            border-color: #4dd0e1;
            box-shadow: 0 0 0 3px rgba(77, 208, 225, 0.15);
        }
        .no-unlinked-msg {
            font-size: 14px;
            color: #78909c;
            padding: 12px 0;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4dd0e1, #26a69a);
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 208, 225, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .powered-by {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">

        <a href="{{ url_for('join_event') }}" class="back-link">← コード入力に戻る</a>

        <div class="header">
            <h1>あなたはどの参加者ですか？</h1>
            <span class="event-badge">{{ event.event_name }}</span>
        </div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('join_event_confirm', event_id=event.event_id) }}">
            <input type="hidden" name="event_id" value="{{ event.event_id }}">

            <div class="card">
                <div class="card-title">参加者を選択</div>

                <div class="radio-list">
                    {% if unlinked %}
                        {% for p in unlinked %}
                            <label class="radio-item">
                                <input type="radio" name="selected_ep_id" value="{{ p.event_participant_id }}">
                                <span>{{ p.display_name }}</span>
                            </label>
                        {% endfor %}
                    {% else %}
                        <p class="no-unlinked-msg">幹事が事前登録した参加者はいません</p>
                    {% endif %}

                    <label class="radio-item radio-item-new">
                        <input type="radio" name="selected_ep_id" value="new"
                            {% if not unlinked %}checked{% endif %}>
                        <span>＋ 新しい参加者として参加する</span>
                    </label>
                </div>

                <div id="new_name_section" style="{% if unlinked %}display: none;{% endif %}">
                    <label>表示名を入力してください</label>
                    <input type="text" name="display_name" placeholder="例：たなか">
                </div>
            </div>

            <button type="submit" class="submit-btn">参加を確定する</button>
        </form>

        <div class="powered-by">TRIPSPLIT</div>

    </div>

    <script>
        document.querySelectorAll('input[name="selected_ep_id"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                var section = document.getElementById('new_name_section');
                if (this.value === 'new') {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
