<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Trip split</title>
</head>
<body>
  <h1>イベントを作成する</h1>
  <form action="{{ url_for('index') }}" method="post">
    <label for="event_name">イベント名:</label>
    <input type="text" id="event_name" name="event_name" required>
    <br>
        <label for="event_date">イベント日程:</label>
    <input type="number" id="event_date" name="event_date" required>
    <br>
    <label for="participant_name">参加者名:</label>
    <input type="text" id="participant_name" name="participant_name" required>
    <br>    
    <button type="submit">追加</button>
  </form>
</body>
</html>
