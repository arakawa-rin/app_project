<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招待コードで参加 - TripSplit</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 440px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            color: #78909c;
        }
        .back-link {
            display: inline-block;
            color: #4dd0e1;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #4dd0e1;
            border-radius: 20px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .back-link:hover {
            background: #4dd0e1;
            color: #0f2027;
        }
        .error-msg {
            background: rgba(244, 67, 54, 0.15);
            border-left: 4px solid #f44336;
            color: #ff8a80;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 16px;
        }
        .code-input-wrapper {
            margin-bottom: 24px;
        }
        .code-input-wrapper label {
            display: block;
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .code-input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            font-family: 'Noto Sans JP', monospace;
            text-align: center;
            letter-spacing: 8px;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }
        .code-input::placeholder {
            font-size: 16px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
        }
        .code-input:focus {
            outline: none;
            border-color: #4dd0e1;
            box-shadow: 0 0 0 3px rgba(77, 208, 225, 0.15);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4dd0e1, #26a69a);
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 208, 225, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .hint {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
        .powered-by {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">

        <a href="{{ url_for('index') }}" class="back-link">← トップに戻る</a>

        <div class="header">
            <h1>招待コードで参加</h1>
            <p>イベント幹事から共有されたコードを入力してください</p>
        </div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('join_event') }}">
            <div class="card">
                <div class="code-input-wrapper">
                    <label>招待コード（6桁）</label>
                    <input type="text" name="invite_code" class="code-input"
                           maxlength="6" placeholder="ABC123" autocomplete="off">
                </div>

                <div class="code-input-wrapper">
                    <label>あなたの表示名</label>
                    <input type="text" name="display_name" class="code-input"
                           style="font-size:16px; letter-spacing:2px;"
                           placeholder="例：たなか">
                </div>

                <button type="submit" class="submit-btn">参加する</button>
            </div>
        </form>

        <p class="hint">招待コードはイベント詳細画面に表示されています</p>

        <div class="powered-by">TRIPSPLIT</div>

    </div>

    <script>
        // 招待コードを自動で大文字に変換
        document.querySelector('input[name="invite_code"]').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
    </script>

</body>
</html>
