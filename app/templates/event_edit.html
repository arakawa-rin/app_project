<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント編集 - TripSplit</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            color: #4dd0e1;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #4dd0e1;
            border-radius: 20px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .back-link:hover {
            background: #4dd0e1;
            color: #0f2027;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
        }
        .error-msg {
            background: rgba(244, 67, 54, 0.15);
            border-left: 4px solid #f44336;
            color: #ff8a80;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: 'Noto Sans JP', sans-serif;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4dd0e1;
            box-shadow: 0 0 0 3px rgba(77, 208, 225, 0.15);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4dd0e1, #26a69a);
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 208, 225, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .powered-by {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">

        <a href="/events/{{ events.event_id }}" class="back-link">← イベント詳細に戻る</a>

        <h1>イベント編集</h1>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/events/{{ events.event_id }}/edit">
            <div class="card">
                <div class="form-group">
                    <label>イベント名</label>
                    <input type="text" name="event_name" value="{{ events.event_name }}">
                </div>

                <div class="form-group">
                    <label>開始日</label>
                    <input type="date" name="start_date" value="{{ events.start_date }}">
                </div>

                <div class="form-group">
                    <label>終了日</label>
                    <input type="date" name="end_date" value="{{ events.end_date }}">
                </div>
            </div>

            <button type="submit" class="submit-btn">変更を保存する</button>
        </form>

        <div class="powered-by">TRIPSPLIT</div>

    </div>
</body>
</html>
