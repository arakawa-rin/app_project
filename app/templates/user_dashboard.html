<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダッシュボード</title>
</head>
<body>
  <h1>ダッシュボード</h1>

  <h2>新規イベント一覧</h2>
  <ul>
    {% for event in events %}
      <p>{{ イベント名 }}<p>
      <p>{{ イベント日付 }}<p>
      <p>{{ 参加者の名前 }}<p>
    {% endfor %}
  </ul>

  <a href="{{ url_for('index') }}">イベントを追加する</a>
</body>
</html>
